<div class="mt-5 p-4 rounded-lg {% if variant == 'warning' %}border border-amber-500/30 bg-amber-500/10{% elif variant == 'info' %}border border-blue-500/30 bg-blue-500/10{% else %}border border-slate-700 bg-slate-900/60{% endif %}">
    {% if title %}
        <p class="text-xs font-semibold uppercase tracking-widest {% if variant == 'warning' %}text-amber-100{% elif variant == 'info' %}text-blue-100{% else %}text-slate-200{% endif %}">
            {{ title }}
        </p>
    {% endif %}
    {% if text %}
        <p class="mt-1 text-xs leading-relaxed {% if variant == 'warning' %}text-amber-200{% elif variant == 'info' %}text-blue-200{% else %}text-slate-300{% endif %}">
            {{ text }}
        </p>
    {% endif %}
    {% if items %}
        <ul class="mt-2 space-y-1 text-xs {% if variant == 'warning' %}text-amber-200{% elif variant == 'info' %}text-blue-200{% else %}text-slate-300{% endif %} list-disc pl-5">
            {% for item in items %}
                <li>{{ item }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</div>
