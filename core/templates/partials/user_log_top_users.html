<div class="scanops-panel p-5">
    <h3 class="text-sm font-bold text-slate-200 uppercase tracking-widest mb-4">Top Users</h3>
    <div class="overflow-x-auto">
        <table class="w-full text-sm text-left">
            <thead class="text-[10px] uppercase tracking-widest text-slate-500">
            <tr>
                <th class="pb-2 pr-3">Username</th>
                <th class="pb-2 pr-3">Total</th>
                <th class="pb-2 pr-3">Logins</th>
                <th class="pb-2 pr-3">Failed</th>
                <th class="pb-2 pr-3">Last Activity</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-800">
            {% for row in top_users %}
                <tr>
                    <td class="py-2 pr-3 text-slate-200">{{ row.actor_name|default:"Unknown" }}</td>
                    <td class="py-2 pr-3 text-slate-100 font-semibold">{{ row.total_actions }}</td>
                    <td class="py-2 pr-3 text-emerald-300">{{ row.login_count }}</td>
                    <td class="py-2 pr-3 text-rose-300">{{ row.failed_count }}</td>
                    <td class="py-2 pr-3 text-slate-400">{{ row.last_activity|date:"Y-m-d H:i" }}</td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="5" class="py-6 text-center text-slate-500">No user activity found.</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
