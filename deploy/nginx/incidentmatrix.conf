# Example Nginx configuration for IncidentMatrix
# Place this in /etc/nginx/sites-available/incidentmatrix and enable it.
# TLS settings are aligned to a Mozilla "Intermediate" style baseline:
# TLS 1.2 + TLS 1.3 only, modern AEAD cipher suites only, weak/legacy ciphers disabled.
# Replace the placeholder host/certificate paths before deploying.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name example.com www.example.com; # Replace with your domain

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com; # Replace with your domain

    # SSL certificate files (replace with your cert paths)
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # Strong TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    # Optional on supported nginx/OpenSSL builds. If unsupported, omit this line and TLS 1.3
    # will still use OpenSSL's built-in secure cipher suite selection.
    ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
    ssl_buffer_size 4k;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_trusted_certificate /etc/letsencrypt/live/example.com/chain.pem;
    resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
    resolver_timeout 5s;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers (additional to Django middleware - defense-in-depth)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    # CSP is emitted by Django so per-request nonces can be attached to inline
    # scripts safely. Do not override it here with a static header.

    # Prevent information disclosure
    server_tokens off;

    # Never expose repository/private paths through the web root, even if the site root is misconfigured.
    location ~ ^/(?:\.git|\.hg|\.svn|\.idea|\.venv|app_logs|backup|deploy|documents|GeoLite2City|logs|scripts|core|apps|apis|base|media_root|static_root)(?:/|$) {
        return 404;
    }

    location ~ /\.(?!well-known(?:/|$)) {
        return 404;
    }

    # Serve only the collected static files directory.
    location /static/ {
        alias /var/www/incidentmatrix/static_root/static/; # match Django STATIC_ROOT
        autoindex off;
        try_files $uri =404;
    }

    # Serve only the configured public media root used by Django uploads.
    location /media/ {
        alias /var/www/incidentmatrix/media_root/media/; # match Django MEDIA_ROOT
        autoindex off;
        try_files $uri =404;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock; # or upstream

        # Forward the original HTTPS scheme so Django can enforce secure cookies/HSTS correctly.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Forwarded;
        proxy_hide_header Server;
        proxy_hide_header Via;
        proxy_hide_header X-Backend-Server;
        proxy_hide_header X-Forwarded-For;
        proxy_hide_header X-Powered-By;
        proxy_hide_header X-Real-IP;
        proxy_hide_header X-Served-By;
        proxy_hide_header X-Upstream;

        # Timeouts
        proxy_connect_timeout 10;
        proxy_send_timeout 120;
        proxy_read_timeout 180;
        send_timeout 180;
    }
}
