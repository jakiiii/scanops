<div class="overflow-x-auto">
    <table class="w-full text-sm text-left">
        <thead class="bg-slate-900/70 text-[10px] uppercase tracking-widest text-slate-500">
        <tr>
            <th class="px-4 py-3">Date</th>
            <th class="px-4 py-3">Total Logs</th>
            <th class="px-4 py-3">Success Count</th>
            <th class="px-4 py-3">Failure Count</th>
        </tr>
        </thead>
        <tbody class="divide-y divide-slate-800">
        {% for row in trend_rows %}
            <tr class="hover:bg-slate-900/40">
                <td class="px-4 py-3 text-slate-300">{{ row.date|date:"Y-m-d" }}</td>
                <td class="px-4 py-3 text-slate-100 font-semibold">{{ row.total_logs }}</td>
                <td class="px-4 py-3 text-emerald-300">{{ row.success_count }}</td>
                <td class="px-4 py-3 text-rose-300">{{ row.failure_count }}</td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="4" class="px-4 py-8 text-center text-slate-500">No trend data available for the selected filters.</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
