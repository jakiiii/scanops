<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>ScanOps Password Reset</title>
</head>
<body style="font-family: Arial, sans-serif; color: #0f172a; line-height: 1.5;">
<p>You requested a password reset for your ScanOps account.</p>
<p>If you did not request this, you can ignore this email.</p>
<p>
    <a href="{{ protocol }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}">
        Reset password
    </a>
</p>
<p>Username: {{ user.get_username }}</p>
</body>
</html>
