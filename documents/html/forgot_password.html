<p class="text-sm text-on-surface-variant leading-relaxed">Enter your registered email address. We will transmit a secure reset token to your terminal.</p>
</header>
<form action="#" class="space-y-6" method="POST">
<!-- Input Field -->
<div class="space-y-2">
<label class="label-md block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant" for="email">

<div class="absolute right-3 top-1/2 -translate-y-1/2 text-outline/30 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">alternate_email</span>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="w-full primary-gradient text-on-primary font-semibold py-3.5 rounded-md active:scale-[0.98] transition-all flex items-center justify-center gap-2 group shadow-lg shadow-primary/10" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-sm transition-transform group-hover:translate-x-1">send</span>
</button>
</form>
<footer class="mt-10 pt-6 border-t border-outline-variant/10 flex flex-col items-center gap-4">
<a class="inline-flex items-center gap-2 text-sm text-on-surface-variant hover:text-primary transition-colors font-medium" href="/login">
