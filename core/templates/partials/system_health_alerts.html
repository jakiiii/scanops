{% load scanops_tags %}
<div class="scanops-panel p-5">
    <h3 class="text-sm font-bold text-slate-200 uppercase tracking-widest mb-4">Active Alerts</h3>
    <div class="space-y-3">
        {% for alert in alerts %}
            <div class="rounded-lg border border-slate-800 bg-slate-900/60 p-4">
                <div class="flex items-center justify-between gap-3">
                    <p class="text-sm font-semibold text-slate-100">{{ alert.get_service_name_display }}</p>
                    <span class="px-2 py-1 rounded text-[11px] {{ alert.status|status_badge }}">{{ alert.get_status_display }}</span>
                </div>
                <p class="text-sm text-slate-400 mt-2">{{ alert.summary }}</p>
                <p class="text-[11px] text-slate-500 mt-2">{{ alert.checked_at|date:"Y-m-d H:i:s" }}</p>
            </div>
        {% empty %}
            <p class="text-sm text-emerald-300">No warning/error alerts detected in recent snapshots.</p>
        {% endfor %}
    </div>
</div>
