<div class="scanops-panel p-5">
    <h3 class="text-sm font-bold text-slate-200 uppercase tracking-widest mb-4">Top Actions</h3>
    <div class="overflow-x-auto">
        <table class="w-full text-sm text-left">
            <thead class="text-[10px] uppercase tracking-widest text-slate-500">
            <tr>
                <th class="pb-2 pr-3">Action Type</th>
                <th class="pb-2 pr-3">Count</th>
                <th class="pb-2 pr-3">Success</th>
                <th class="pb-2 pr-3">Failure</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-800">
            {% for row in top_actions %}
                <tr>
                    <td class="py-2 pr-3 text-slate-200">{{ row.action_label }}</td>
                    <td class="py-2 pr-3 text-slate-100 font-semibold">{{ row.count }}</td>
                    <td class="py-2 pr-3 text-emerald-300">{{ row.success_count }}</td>
                    <td class="py-2 pr-3 text-rose-300">{{ row.failure_count }}</td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="4" class="py-6 text-center text-slate-500">No action data available.</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
