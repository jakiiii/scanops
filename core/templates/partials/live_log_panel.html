<div class="scanops-panel p-6">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-base font-semibold text-white">Live Event Timeline</h3>
        <span class="text-[11px] text-slate-500 uppercase tracking-widest">auto refresh</span>
    </div>
    <div class="space-y-3 max-h-[420px] overflow-y-auto pr-1">
        {% for event in logs %}
            <div class="flex gap-3">
                <div class="mt-1 w-2 h-2 rounded-full bg-blue-400"></div>
                <div class="flex-1 bg-slate-900/70 border border-slate-800 rounded-lg p-3">
                    <div class="flex justify-between gap-3">
                        <p class="text-[11px] uppercase tracking-widest text-blue-300">{{ event.event_type }}</p>
                        <p class="text-[11px] text-slate-500">{{ event.created_at|date:"H:i:s" }}</p>
                    </div>
                    <p class="text-sm text-slate-200 mt-1">{{ event.message }}</p>
                    {% if event.metadata_json %}
                        <p class="text-xs text-slate-500 mt-1 font-mono">{{ event.metadata_json }}</p>
                    {% endif %}
                </div>
            </div>
        {% empty %}
            <p class="text-sm text-slate-500">No monitor events yet.</p>
        {% endfor %}
    </div>
</div>
